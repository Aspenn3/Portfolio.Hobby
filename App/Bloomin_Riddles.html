<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloomin Riddles</title>

  <style>
    :root {
      --bg1: #fff8fb;
      --bg2: #f3f8ff;
      --card: rgba(255, 255, 255, 0.78);
      --text: #5d4b66;
      --muted: #8c7a96;
      --pink: #f6b8d0;
      --pink2: #f18fb3;
      --mint: #c7efd7;
      --lavender: #ddd6fe;
      --yellow: #fde68a;
      --green: #86efac;
      --shadow: 0 20px 60px rgba(128, 96, 140, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(246, 184, 208, 0.45), transparent 30%),
        radial-gradient(circle at top right, rgba(221, 214, 254, 0.5), transparent 28%),
        radial-gradient(circle at bottom left, rgba(199, 239, 215, 0.45), transparent 32%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .petal {
      position: fixed;
      width: 18px;
      height: 18px;
      border-radius: 50% 0 50% 50%;
      opacity: 0.24;
      background: var(--pink2);
      animation: float 14s linear infinite;
      z-index: 0;
    }

    .petal:nth-child(1) { top: 8%; left: 10%; animation-duration: 16s; transform: rotate(25deg); }
    .petal:nth-child(2) { top: 18%; right: 12%; background: var(--lavender); animation-duration: 18s; }
    .petal:nth-child(3) { bottom: 18%; left: 8%; background: var(--mint); animation-duration: 15s; }
    .petal:nth-child(4) { bottom: 10%; right: 16%; background: var(--yellow); animation-duration: 19s; }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-24px) rotate(180deg); }
      100% { transform: translateY(0) rotate(360deg); }
    }

    .card {
      width: min(920px, 100%);
      background: var(--card);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 28px;
      position: relative;
      z-index: 1;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .flower {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #fff8b3 0 15%, transparent 16%),
        radial-gradient(circle at 50% 20%, #f8bfd5 0 22%, transparent 23%),
        radial-gradient(circle at 80% 50%, #f8bfd5 0 22%, transparent 23%),
        radial-gradient(circle at 50% 80%, #f8bfd5 0 22%, transparent 23%),
        radial-gradient(circle at 20% 50%, #f8bfd5 0 22%, transparent 23%),
        linear-gradient(135deg, #ffd6e7, #f7a8c3);
      box-shadow: inset 0 0 0 5px rgba(255, 255, 255, 0.45);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.25rem);
      line-height: 1;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      max-width: 620px;
    }

    .badge {
      padding: 10px 14px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(246, 184, 208, 0.42), rgba(221, 214, 254, 0.45));
      color: #6b4d73;
      font-weight: 700;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      margin-top: 18px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.72);
      border-radius: 24px;
      padding: 22px;
      border: 1px solid rgba(133, 106, 149, 0.12);
    }

    .label {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #9a7aa4;
      margin-bottom: 10px;
      font-weight: 700;
    }

    #riddle {
      font-size: clamp(1.25rem, 2.8vw, 1.7rem);
      line-height: 1.55;
      margin: 0;
      min-height: 120px;
    }

    #answer {
      margin-top: 14px;
      display: none;
      font-weight: 800;
      color: #5b8f62;
      background: rgba(199, 239, 215, 0.45);
      padding: 10px 12px;
      border-radius: 14px;
    }

    .stats {
      display: grid;
      gap: 12px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.8);
      border-radius: 18px;
      padding: 16px;
      border: 1px solid rgba(133, 106, 149, 0.10);
    }

    .stat strong {
      display: block;
      font-size: 1.2rem;
      margin-top: 6px;
    }

    .difficulty {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 0;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-pink {
      background: linear-gradient(135deg, var(--pink), var(--pink2));
      color: white;
      box-shadow: 0 10px 24px rgba(241, 143, 179, 0.28);
    }

    .btn-mint {
      background: linear-gradient(135deg, var(--mint), #7dd3a9);
      color: #28523a;
      box-shadow: 0 10px 24px rgba(125, 211, 169, 0.25);
    }

    .btn-lav {
      background: linear-gradient(135deg, var(--lavender), #c4b5fd);
      color: #594b88;
      box-shadow: 0 10px 24px rgba(196, 181, 253, 0.25);
    }

    .btn-soft {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(133, 106, 149, 0.12);
      color: var(--text);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    input {
      flex: 1;
      min-width: 220px;
      border: 1px solid rgba(133, 106, 149, 0.18);
      border-radius: 16px;
      padding: 13px 14px;
      font: inherit;
      outline: none;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
    }

    input:focus {
      border-color: #f18fb3;
      box-shadow: 0 0 0 4px rgba(241, 143, 179, 0.15);
    }

    .message {
      margin-top: 14px;
      min-height: 24px;
      font-weight: 700;
    }

    .good { color: #2f8f57; }
    .bad { color: #d54b67; }
    .neutral { color: #7d6b85; }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>

  <main class="card">
    <div class="header">
      <div class="brand">
        <div class="flower" aria-hidden="true"></div>
        <div>
          <h1>Bloom & Riddle | <a href="../index.html">Return</a></h1>
          <p class="subtitle">A playful floral riddle game with hints, score streaks, and confetti celebrations.</p>
        </div>
      </div>
      <div class="badge">Fresh blooms. Fresh brain teasers.</div>
    </div>

    <div class="difficulty">
      <button class="btn-soft" data-difficulty="all">All</button>
      <button class="btn-soft" data-difficulty="easy">Easy</button>
      <button class="btn-soft" data-difficulty="medium">Medium</button>
      <button class="btn-soft" data-difficulty="hard">Hard</button>
    </div>

    <section class="grid">
      <div class="panel">
        <div class="label">Riddle</div>
        <p id="riddle"></p>
        <div id="answer"></div>

        <div class="controls">
          <input id="guess" type="text" placeholder="Type your guess here..." autocomplete="off" />
          <button class="btn-mint" id="checkBtn">Check Answer</button>
        </div>

        <div class="controls">
          <button class="btn-pink" id="newBtn">New Riddle</button>
          <button class="btn-lav" id="hintBtn">Hint</button>
          <button class="btn-soft" id="revealBtn">Reveal Answer</button>
          <button class="btn-soft" id="copyBtn">Copy Riddle</button>
        </div>

        <div id="message" class="message neutral"></div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="label">Streak</div>
          <strong id="streak">0</strong>
        </div>
        <div class="stat">
          <div class="label">Solved</div>
          <strong id="solved">0</strong>
        </div>
        <div class="stat">
          <div class="label">Current Difficulty</div>
          <strong id="currentDifficulty">All</strong>
        </div>
        <div class="stat">
          <div class="label">Theme</div>
          <strong>Floral Pastels</strong>
        </div>
      </div>
    </section>

    <div class="footer-note">Tip: press Enter to submit your guess.</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>
  <script>
    const riddles = [
      { q: "What has keys but cannot open locks?", a: "keyboard", h: "You use it to type.", d: "easy" },
      { q: "What gets wetter as it dries?", a: "towel", h: "You find it in a bathroom.", d: "easy" },
      { q: "I speak without a mouth and hear without ears. What am I?", a: "echo", h: "It repeats your voice.", d: "medium" },
      { q: "What has one eye but cannot see?", a: "needle", h: "It helps with sewing.", d: "medium" },
      { q: "The more you take, the more you leave behind. What are they?", a: "footsteps", h: "You make them while walking.", d: "hard" },
      { q: "What invention lets you look right through a wall?", a: "window", h: "It is often made of glass.", d: "hard" }
    ];

    const els = {
      riddle: document.getElementById("riddle"),
      answer: document.getElementById("answer"),
      guess: document.getElementById("guess"),
      msg: document.getElementById("message"),
      streak: document.getElementById("streak"),
      solved: document.getElementById("solved"),
      currentDifficulty: document.getElementById("currentDifficulty")
    };

    let difficulty = "all";
    let current = null;
    let streak = 0;
    let solved = 0;

    function normalize(text) {
      return text.trim().toLowerCase().replace(/[^a-z0-9 ]/g, "");
    }

    function setMsg(text, type = "neutral") {
      els.msg.textContent = text;
      els.msg.className = `message ${type}`;
    }

    function celebrate() {
      confetti({
        particleCount: 110,
        spread: 78,
        origin: { y: 0.72 },
        colors: ["#f18fb3", "#c7efd7", "#ddd6fe", "#fde68a", "#86efac"]
      });
      setTimeout(() => {
        confetti({
          particleCount: 55,
          spread: 110,
          origin: { y: 0.65 },
          scalar: 0.9,
          colors: ["#f6b8d0", "#fce7f3", "#c4b5fd", "#bbf7d0"]
        });
      }, 220);
    }

    function filteredRiddles() {
      return difficulty === "all" ? riddles : riddles.filter(r => r.d === difficulty);
    }

    function pickRiddle() {
      const pool = filteredRiddles();
      current = pool[Math.floor(Math.random() * pool.length)];
      els.riddle.textContent = current.q;
      els.answer.textContent = `Answer: ${current.a}`;
      els.answer.style.display = "none";
      els.guess.value = "";
      els.currentDifficulty.textContent = difficulty.charAt(0).toUpperCase() + difficulty.slice(1);
      setMsg("Type a guess, ask for a hint, or reveal the answer.", "neutral");
    }

    document.getElementById("checkBtn").addEventListener("click", () => {
      const guess = normalize(els.guess.value);
      if (!guess) {
        setMsg("Enter a guess first.", "bad");
        return;
      }

      if (guess === normalize(current.a)) {
        streak += 1;
        solved += 1;
        els.streak.textContent = streak;
        els.solved.textContent = solved;
        els.answer.style.display = "block";
        setMsg("Correct! You earned flower confetti!", "good");
        celebrate();
        setTimeout(pickRiddle, 1200);
      } else {
        streak = 0;
        els.streak.textContent = streak;
        setMsg("Not quite — try again.", "bad");
      }
    });

    document.getElementById("newBtn").addEventListener("click", pickRiddle);

    document.getElementById("hintBtn").addEventListener("click", () => {
      setMsg(`Hint: ${current.h}`, "neutral");
    });

    document.getElementById("revealBtn").addEventListener("click", () => {
      els.answer.style.display = "block";
      setMsg("Answer revealed.", "neutral");
    });

    document.getElementById("copyBtn").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(`${current.q} Answer: ${current.a}`);
        setMsg("Riddle copied to clipboard.", "good");
      } catch {
        setMsg("Copy failed in this browser.", "bad");
      }
    });

    document.querySelectorAll("[data-difficulty]").forEach(btn => {
      btn.addEventListener("click", () => {
        difficulty = btn.dataset.difficulty;
        pickRiddle();
      });
    });

    els.guess.addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("checkBtn").click();
    });

    pickRiddle();
  </script>
</body>
</html>
